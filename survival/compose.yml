services:
  mc:
    image: itzg/minecraft-server:java21
    container_name: "${SERVER_NAME:-Minecraft}-mc-server"
    restart: unless-stopped
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
    volumes:
      # attach the relative directory 'data' to the container's /data path
      - ./data:/data
